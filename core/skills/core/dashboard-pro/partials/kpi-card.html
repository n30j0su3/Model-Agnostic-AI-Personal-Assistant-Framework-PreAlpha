<!-- KPI Card Component -->
<div class="glass rounded-xl p-6 card">
  <div class="flex items-center justify-between mb-2">
    <span class="text-sm text-gray-500 dark:text-gray-400">{{title}}</span>
    <span class="text-{{color}}-500">{{icon}}</span>
  </div>
  <div class="text-2xl font-bold mb-1">{{metric}}</div>
  <div class="text-sm {{#if (eq trend.direction 'up')}}text-green-500{{else}}text-red-500{{/if}}">
    {{#if (eq trend.direction 'up')}}↑{{else}}↓{{/if}} {{trend.value}}%
  </div>
</div>
