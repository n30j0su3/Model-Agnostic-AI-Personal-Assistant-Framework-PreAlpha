<!-- Partial: KPI Card Template -->
{{#each kpiCards}}
<div class="glass rounded-xl p-6">
  <div class="flex items-center justify-between mb-2">
    <span class="text-sm text-gray-500 dark:text-gray-400">{{title}}</span>
    <span class="text-{{color}}-500">{{icon}}</span>
  </div>
  <div class="text-2xl font-bold mb-1">{{metric}}</div>
  <div class="text-sm {{#if trend.direction=='up'}}text-green-500{{else}}text-red-500{{/if}}">
    {{#if trend.direction=='up'}}↑{{else}}↓{{/if}} {{trend.value}}%
  </div>
</div>
{{/each}}
