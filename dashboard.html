    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-in { animation: slideInLeft 0.3s ease-out; }
        
        /* KPI Card hover effect */
        .kpi-card {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        /* Glass effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        /* Page transition */
        .page-transition {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* Sidebar active state */
        .nav-item {
            position: relative;
            transition: all 0.2s;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: #3b82f6;
            transition: height 0.2s;
            border-radius: 0 3px 3px 0;
        }
        .nav-item:hover::before,
        .nav-item.active::before {
            height: 60%;
        }
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        
        /* Chat message styles */
        .message-agent {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px 12px 12px 4px;
        }
        .message-user {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 12px 12px 4px 12px;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideInLeft 0.3s ease-out;
        }
        
        /* Workflow Styles */
        .workflow-step {
            transition: all 0.3s ease;
        }
        
        .workflow-step:hover {
            transform: translateX(4px);
        }
        
        .step-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #475569;
            border-radius: 0.375rem;
            background-color: #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .step-checkbox:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        
        .step-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        
        .step-checkbox:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        
        /* Workflow Toast */
        .workflow-toast {
            animation: slideInRight 0.3s ease-out;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Mobile responsiveness for workflow */
        @media (max-width: 768px) {
            .workflow-step {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .workflow-step .step-indicator {
                align-self: flex-start;
            }
        }
        
        /* Toggle Switch Animation */
        .peer:checked ~ .peer-checked\:bg-amber-500 {
            background-color: #f59e0b;
        }
        
        .peer:checked ~ .peer-checked\:after\:translate-x-full::after {
            transform: translateX(100%);
        }
    </style>
</head>

    <script>
        // ============================================
        // DATA STORE - Framework Data
        // ============================================
        const store = {
            sessions: [],
            interactions: [],
            skills: [],
            lspErrors: [],
            stats: {
                totalSessions: 0,
                totalSkills: 22,
                totalProjects: 0,
                totalInteractions: 0,
                avgSessionDuration: 0,
                codeQuality: 98,
                weeklyGrowth: 12
            },
            currentSession: null,
            isLoading: true
        };

        // ============================================
        // DATA LOADER - Fetch framework data
        // ============================================
        const dataLoader = {
            async loadAll() {
                try {
                    await Promise.all([
                        this.loadSessions(),
                        this.loadInteractions(),
                        this.loadSkills(),
                        this.loadAgents(),
                        this.loadLPSErrors()
                    ]);
                    this.calculateStats();
                    return true;
                } catch (error) {
                    console.error('Error loading data:', error);
                    this.loadDemoData();
                    return false;
                }
            },

            async loadSessions() {
                try {
                    const response = await fetch('core/.context/knowledge/sessions-index.json');
                    if (response.ok) {
                        const data = await response.json();
                        store.sessions = data.sessions || [];
                        store.stats.totalSessions = data.total_sessions || 0;
                        return;
                    }
                } catch (e) {
                    console.warn('[Sessions] Fetch failed (CORS), using embedded data');
                }
                // Fallback a datos incrustados (file:// compatible)
                store.sessions = window.DASHBOARD_DATA?.sessions || [];
                store.stats.totalSessions = store.sessions.length;
            },

            async loadInteractions() {
                store.stats.totalInteractions = 0;  // 0 por defecto (file:// no soporta fetch)
            },

            async loadSkills() {
                try {
                    const response = await fetch('core/.context/knowledge/skills-index.json');
                    if (response.ok) {
                        const data = await response.json();
                        store.skills = data.skills || [];
                        store.stats.totalSkills = data.total_skills || 0;
                        console.log('[Skills] Loaded via fetch');
                        return;
                    }
                } catch (e) {
                    console.warn('[Skills] Fetch failed (CORS)');
                }
                // Fallback a datos incrustados (file:// compatible)
                store.skills = window.DASHBOARD_DATA?.skills || [];
                store.stats.totalSkills = store.skills.length;
                console.log('[Skills] Using embedded data: ' + store.skills.length + ' skills');
            },
            
            async loadAgents() {
                try {
                    const response = await fetch('core/.context/knowledge/agents-index.json');
                    if (response.ok) {
                        const data = await response.json();
                        store.agents = data.agents || [];
                        store.stats.totalAgents = data.total_agents || 0;
                        console.log('[Agents] Loaded via fetch');
                        return;
                    }
                } catch (e) {
                    console.warn('[Agents] Fetch failed (CORS)');
                }
                // Fallback a datos incrustados (file:// compatible)
                store.agents = window.DASHBOARD_DATA?.agents || [];
                console.log('[Agents] Using embedded data: ' + store.agents.length + ' agents');
            },

            async loadLPSErrors() {
                store.lspErrors = [
                    { file: 'session-start.py', line: 283, severity: 'warning', message: 'Type hint mismatch' }
                ];
            },

            calculateStats() {
                store.stats.totalSessions = store.sessions.length;
                store.stats.totalSkills = store.skills.length;
                store.stats.totalInteractions = 0;  // File:// no soporta fetch de logs
                store.stats.codeQuality = Math.max(0, 100 - (store.lspErrors.length * 2));
                
                // Weekly Growth: 0 si no hay datos históricos
                store.stats.weeklyGrowth = 0;
            },

        // ============================================

        const charts = {

        // ============================================
        // WORKFLOW MANAGER - Interactive Workflow Guide
        // ============================================
        const workflowManager = {
            state: {
                steps: {},
                expressMode: false,
                complexity: 'simple'
            },

            init() {
                this.loadState();
                this.updateUI();
                
                // Add event listeners to checkboxes
                document.querySelectorAll('.step-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const step = parseInt(e.target.dataset.step);
                        this.state.steps[step] = e.target.checked;
                        this.saveState();
                        this.updateUI();
                    });
                });
            },

            toggleStep(step) {
                this.state.steps[step] = !this.state.steps[step];
                this.saveState();
                this.updateUI();
            },

            toggleExpressMode() {
                this.state.expressMode = !this.state.expressMode;
                
                // Guardar en localStorage para persistencia entre sesiones
                configManager.setSetting('expressMode', this.state.expressMode);
                
                this.updateUI();
                this.showToast(
                    this.state.expressMode 
                        ? 'Modo Express ACTIVADO - Salta planificación (paso 3). Ideal para tareas simples.' 
                        : 'Modo Express DESACTIVADO - Flujo completo de 7 pasos. Recomendado para features complejas.'
                );
            },

            toggleComplexity() {
                this.state.complexity = this.state.complexity === 'simple' ? 'complex' : 'simple';
                this.saveState();
                this.updateUI();
            },

            markAllComplete() {
                for (let i = 1; i <= 7; i++) {
                    this.state.steps[i] = true;
                }
                this.saveState();
                this.updateUI();
                this.showToast('¡Todos los pasos completados!');
            },

            resetAll() {
                this.state.steps = {};
                this.state.expressMode = false;
                this.saveState();
                this.updateUI();
                this.showToast('Workflow reiniciado');
            },

            updateUI() {
                // Update checkboxes
                document.querySelectorAll('.step-checkbox').forEach(checkbox => {
                    const step = parseInt(checkbox.dataset.step);
                    checkbox.checked = !!this.state.steps[step];
                });

                // Update step indicators
                document.querySelectorAll('.workflow-step').forEach((stepEl, index) => {
                    const step = index + 1;
                    const isCompleted = !!this.state.steps[step];
                    const isInProgress = !isCompleted && this.isStepInProgress(step);
                    const indicator = stepEl.querySelector('.step-indicator');
                    
                    // Update indicator appearance
                    if (isCompleted) {
                        indicator.className = 'step-indicator flex-shrink-0 w-12 h-12 rounded-full bg-green-500 flex items-center justify-center text-white font-bold z-10 transition-all duration-300 ring-4 ring-green-500/20';
                        indicator.innerHTML = '✓';
                        stepEl.classList.add('opacity-75');
                    } else if (isInProgress) {
                        indicator.className = 'step-indicator flex-shrink-0 w-12 h-12 rounded-full bg-amber-500 flex items-center justify-center text-white font-bold z-10 transition-all duration-300 ring-4 ring-amber-500/20 animate-pulse';
                        indicator.innerHTML = step;
                        stepEl.classList.remove('opacity-75');
                    } else {
                        indicator.className = 'step-indicator flex-shrink-0 w-12 h-12 rounded-full bg-slate-600 flex items-center justify-center text-white font-bold z-10 transition-all duration-300';
                        indicator.innerHTML = step;
                        stepEl.classList.remove('opacity-75');
                    }
                });

                // Update express mode UI
                const expressToggle = document.getElementById('express-mode-toggle');
                if (expressToggle) {
                    expressToggle.checked = this.state.expressMode;
                }

                // Show/hide express skip text for step 3
                document.querySelectorAll('.express-skip').forEach(el => {
                    el.classList.toggle('hidden', !this.state.expressMode);
                });

                // Update complexity badge
                const complexityValue = document.getElementById('complexity-value');
                const complexityBadge = document.getElementById('complexity-badge');
                if (complexityValue && complexityBadge) {
                    if (this.state.complexity === 'simple') {
                        complexityValue.textContent = 'Simple';
                        complexityValue.className = 'font-semibold text-blue-400';
                        complexityBadge.className = 'px-4 py-2 bg-blue-500/10 border border-blue-500/30 rounded-lg flex items-center gap-2';
                    } else {
                        complexityValue.textContent = 'Complex';
                        complexityValue.className = 'font-semibold text-purple-400';
                        complexityBadge.className = 'px-4 py-2 bg-purple-500/10 border border-purple-500/30 rounded-lg flex items-center gap-2';
                    }
                }

                // Update progress bar
                const completedSteps = Object.values(this.state.steps).filter(Boolean).length;
                const totalSteps = 7;
                const progressPercent = (completedSteps / totalSteps) * 100;
                
                const progressBar = document.getElementById('progress-bar');
                const progressText = document.getElementById('progress-text');
                
                if (progressBar) {
                    progressBar.style.width = progressPercent + '%';
                }
                if (progressText) {
                    progressText.textContent = `${completedSteps}/${totalSteps} pasos completados`;
                }
            },

            isStepInProgress(step) {
                // Step 4 (Execution) is always "in progress" until completed
                if (step === 4) return true;
                
                // Previous steps should be completed for next step to be in progress
                for (let i = 1; i < step; i++) {
                    if (!this.state.steps[i]) return false;
                }
                return true;
            },

            saveState() {
                try {
                    localStorage.setItem('freakingjson-workflow-state', JSON.stringify(this.state));
                } catch (e) {
                    console.warn('Could not save workflow state:', e);
                }
            },

            loadState() {
                try {
                    const saved = localStorage.getItem('freakingjson-workflow-state');
                    if (saved) {
                        this.state = { ...this.state, ...JSON.parse(saved) };
                    }
                    
                    // Cargar modo express de config
                    const expressMode = configManager.getSetting('expressMode', false);
                    this.state.expressMode = expressMode;
                    
                } catch (e) {
                    console.warn('Could not load workflow state:', e);
                }
            },

            showToast(message) {
                const existing = document.querySelector('.workflow-toast');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = 'workflow-toast fixed bottom-20 right-4 px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg shadow-lg z-50 animate-slide-in';
                toast.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        <span class="text-sm">${message}</span>
                    </div>
                `;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // ============================================
        // MODAL MANAGER - Sistema de modales reutilizable
        // ============================================
        const modalManager = {
            open(content, options = {}) {
                const { maxWidth = 'max-w-2xl', onClose } = options;
                
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in';
                overlay.onclick = () => this.close(overlay);
                
                const modal = document.createElement('div');
                modal.className = `${maxWidth} bg-slate-900 border border-slate-800 rounded-xl shadow-2xl max-h-[80vh] overflow-y-auto animate-slide-in`;
                modal.onclick = e => e.stopPropagation();
                
                modal.innerHTML = `
                    <div class="sticky top-0 bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
                        <button onclick="modalManager.close(this.closest('.fixed'))" class="text-slate-400 hover:text-white transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <div class="p-6">${content}</div>
                `;
                
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                
                // Keyboard escape
                const handleEsc = e => {
                    if (e.key === 'Escape') {
                        this.close(overlay);
                        document.removeEventListener('keydown', handleEsc);
                    }
                };
                document.addEventListener('keydown', handleEsc);
                
                if (onClose) onClose();
            },
            
            close(overlay) {
                if (!overlay) return;
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);
            },

                    }
                } catch (e) {
                    console.log('Config no existe, usando defaults');
                }
                return this.defaultConfig;
            },
            
            async save(config) {
                // NOTA: Esto requiere backend para escritura real
                // Por ahora guardamos en localStorage como fallback
                localStorage.setItem('dashboard-config', JSON.stringify(config));
                console.log('[ConfigManager] Config guardada (localStorage)');
            },
            
            getSetting(key, defaultValue) {
                const saved = localStorage.getItem('dashboard-config');
                if (saved) {
                    try {
                        const config = JSON.parse(saved);
                        return config.settings?.[key] ?? defaultValue;
                    } catch (e) {
                        return defaultValue;
                    }
                }
                return defaultValue;
            },
            
            setSetting(key, value) {
                const config = {
                    ...this.defaultConfig,
                    ...JSON.parse(localStorage.getItem('dashboard-config') || '{}')
                };
                config.settings[key] = value;
                config.lastUpdated = new Date().toISOString();
                this.save(config);
            },
            
            reset() {
                localStorage.removeItem('dashboard-config');
                console.log('[ConfigManager] Config reseteada a defaults');
